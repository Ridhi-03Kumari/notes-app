<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Likho — your notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#fbf9f4;
    --linen:#ece4d6;
    --field:#ffffff;
    --ink:#23263d;
    --ink-soft:#5b5d72;
    --amber:#c9761b;
    --amber-deep:#a85f12;
    --amber-soft:#f3e2c7;
    --line:#ddd4c4;
    --danger:#b23a3a;
  }
  [data-theme="dark"]{
    --paper:#24263a;
    --linen:#1a1c2b;
    --field:#2c2f45;
    --ink:#ece8e0;
    --ink-soft:#9fa0b3;
    --amber:#e0922f;
    --amber-deep:#c97e1f;
    --amber-soft:#3a3320;
    --line:#363a52;
    --danger:#e07a6f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--linen);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    line-height:1.55;
    min-height:100vh;
    padding:40px 18px 80px;
    transition:background .25s ease, color .25s ease;
  }
  .wrap{max-width:620px;margin:0 auto;}

  /* Masthead */
  .masthead{
    display:flex;align-items:flex-start;justify-content:space-between;
    margin-bottom:30px;
  }
  .brand{
    font-family:'Fraunces',Georgia,serif;
    font-size:46px;font-weight:600;letter-spacing:-0.02em;line-height:1;margin:0;
  }
  .brand .dot{color:var(--amber);}
  .tagline{margin:8px 0 0;color:var(--ink-soft);font-size:15px;}
  .theme-toggle{
    border:1px solid var(--line);background:var(--paper);
    width:42px;height:42px;border-radius:50%;cursor:pointer;
    font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;
    transition:border-color .15s ease, transform .05s ease;flex-shrink:0;
  }
  .theme-toggle:hover{border-color:var(--amber);}
  .theme-toggle:active{transform:scale(.94);}

  /* Card */
  .card{
    background:var(--paper);border:1px solid var(--line);border-radius:14px;
    padding:26px 26px 24px;box-shadow:0 14px 30px -22px rgba(0,0,0,.45);
  }

  /* Auth toggle */
  .toggle{display:flex;background:var(--linen);border-radius:10px;padding:4px;margin-bottom:22px;}
  .toggle button{
    flex:1;border:none;background:transparent;font-family:inherit;font-size:14px;font-weight:500;
    color:var(--ink-soft);padding:9px;border-radius:7px;cursor:pointer;transition:all .18s ease;
  }
  .toggle button.active{background:var(--paper);color:var(--ink);box-shadow:0 2px 6px -3px rgba(0,0,0,.4);}

  label{display:block;font-size:12.5px;font-weight:500;color:var(--ink-soft);margin:0 0 6px;letter-spacing:.01em;}
  input,textarea{
    width:100%;font-family:inherit;font-size:15px;color:var(--ink);background:var(--field);
    border:1px solid var(--line);border-radius:9px;padding:11px 13px;margin-bottom:16px;
    transition:border-color .15s ease, box-shadow .15s ease, background .25s ease, color .25s ease;
  }
  textarea{resize:vertical;min-height:90px;}
  input:focus,textarea:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-soft);}

  .btn{
    width:100%;font-family:inherit;font-size:15px;font-weight:600;color:#fff;background:var(--amber);
    border:none;border-radius:9px;padding:12px;cursor:pointer;transition:background .15s ease, transform .05s ease;
  }
  .btn:hover{background:var(--amber-deep);}
  .btn:active{transform:translateY(1px);}

  .msg{font-size:13.5px;padding:10px 13px;border-radius:8px;margin-bottom:16px;display:none;}
  .msg.show{display:block;}
  .msg.error{background:#f6e3e1;color:#b23a3a;border:1px solid #e6c3bf;}
  .msg.ok{background:#e5efe0;color:#3c6b2c;border:1px solid #c9dcbe;}

  /* Notes view */
  .topbar{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px;}
  .hello{font-size:16px;}
  .hello b{font-family:'Fraunces',serif;font-weight:600;}
  .logout{border:none;background:none;cursor:pointer;font-family:inherit;font-size:13.5px;color:var(--ink-soft);text-decoration:underline;text-underline-offset:3px;}
  .logout:hover{color:var(--ink);}

  /* Shared "margin line" slip */
  .slip{
    position:relative;background:var(--paper);border:1px solid var(--line);border-radius:12px;
    padding:20px 22px 20px 30px;margin-bottom:16px;overflow:hidden;
  }
  .slip::before{content:"";position:absolute;left:14px;top:14px;bottom:14px;width:2px;background:var(--amber);border-radius:2px;opacity:.7;}

  .compose-title{font-family:'Fraunces',serif;font-size:19px;font-weight:500;border:none;background:transparent;padding:0;margin:0 0 6px;}
  .compose-title:focus{box-shadow:none;}
  .compose-body{border:none;background:transparent;padding:0;margin:0 0 10px;min-height:54px;font-size:15px;}
  .compose-body:focus{box-shadow:none;}
  .compose-tags{font-size:13px;border:none;background:transparent;padding:0;margin:0 0 12px;color:var(--ink-soft);}
  .compose-tags:focus{box-shadow:none;}
  .compose-actions{display:flex;justify-content:flex-end;align-items:center;}
  .compose-actions .btn{width:auto;padding:9px 20px;font-size:14px;}

  /* Search */
  .search-row{margin:30px 0 14px;}
  .search-row input{margin-bottom:0;}
  .section-label{font-size:12.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin:0 0 14px;}

  .note-title{font-family:'Fraunces',serif;font-size:19px;font-weight:600;margin:0 0 6px;}
  .note-body{margin:0 0 10px;white-space:pre-wrap;}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 10px;}
  .tag{
    font-size:11.5px;font-weight:500;color:var(--amber-deep);background:var(--amber-soft);
    border:none;border-radius:20px;padding:3px 10px;cursor:pointer;font-family:inherit;
  }
  [data-theme="dark"] .tag{color:var(--amber);}
  .tag:hover{filter:brightness(.96);}
  .note-foot{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--ink-soft);}
  .note-actions{display:flex;gap:14px;}
  .link-btn{border:none;background:none;cursor:pointer;font-family:inherit;font-size:12.5px;color:var(--ink-soft);}
  .link-btn:hover{color:var(--ink);}
  .link-btn.danger:hover{color:var(--danger);}

  .empty{text-align:center;color:var(--ink-soft);font-size:14.5px;padding:24px 10px;border:1px dashed var(--line);border-radius:12px;}
  .hidden{display:none;}

  @keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .slip{animation:rise .25s ease both;}
  @media (prefers-reduced-motion:reduce){*{animation:none !important;}}
</style>
</head>
<body>
<div class="wrap">

  <header class="masthead">
    <div>
      <h1 class="brand">Likho<span class="dot">.</span></h1>
      <p class="tagline">A quiet place for your notes.</p>
    </div>
    <button id="themeBtn" class="theme-toggle" type="button" title="Toggle theme">🌙</button>
  </header>

  <!-- AUTH -->
  <section id="authView" class="card">
    <div class="toggle">
      <button id="tabLogin" class="active" type="button">Log in</button>
      <button id="tabRegister" type="button">Sign up</button>
    </div>
    <div id="authMsg" class="msg"></div>

    <div id="loginForm">
      <label>Email</label>
      <input id="loginEmail" type="email" placeholder="you@example.com" />
      <label>Password</label>
      <input id="loginPass" type="password" placeholder="••••••••" />
      <button id="loginBtn" class="btn" type="button">Log in</button>
    </div>

    <div id="registerForm" class="hidden">
      <label>Name</label>
      <input id="regName" type="text" placeholder="Your name" />
      <label>Email</label>
      <input id="regEmail" type="email" placeholder="you@example.com" />
      <label>Password</label>
      <input id="regPass" type="password" placeholder="Choose a password" />
      <button id="registerBtn" class="btn" type="button">Create account</button>
    </div>
  </section>

  <!-- NOTES -->
  <section id="notesView" class="hidden">
    <div class="topbar">
      <span class="hello">Hi, <b id="userName">there</b></span>
      <button id="logoutBtn" class="logout" type="button">Log out</button>
    </div>

    <div id="notesMsg" class="msg"></div>

    <!-- Composer -->
    <div class="slip">
      <input id="noteTitle" class="compose-title" type="text" placeholder="Title" />
      <textarea id="noteBody" class="compose-body" placeholder="Write your note…"></textarea>
      <input id="noteTags" class="compose-tags" type="text" placeholder="Tags (comma separated, e.g. work, ideas)" />
      <div class="compose-actions">
        <button id="addBtn" class="btn" type="button">Add note</button>
      </div>
    </div>

    <!-- Search -->
    <div class="search-row">
      <input id="searchBox" type="text" placeholder="🔍 Search by title, text or tag…" />
    </div>

    <div class="section-label">Your notes</div>
    <div id="notesList"></div>
  </section>

</div>

<script>
  const API = "http://localhost:5000/api";
  let token = null;
  let allNotes = [];

  const $ = (id) => document.getElementById(id);

  function showMsg(el, text, kind){ el.textContent = text; el.className = "msg show " + kind; }
  function clearMsg(el){ el.className = "msg"; }

  async function api(path, method, body){
    const headers = { "Content-Type": "application/json" };
    if (token) headers["Authorization"] = "Bearer " + token;
    const res = await fetch(API + path, { method, headers, body: body ? JSON.stringify(body) : undefined });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.message || "Something went wrong");
    return data;
  }
  function netError(el){ showMsg(el, "Can't reach the server. Make sure the backend is running (node index.js) on port 5000.", "error"); }
  function handle(err, el){ if (err.message === "Failed to fetch") netError(el); else showMsg(el, err.message, "error"); }

  function parseTags(str){ return str.split(",").map(s => s.trim()).filter(Boolean); }

  // ---- theme (in memory; resets on refresh) ----
  $("themeBtn").onclick = () => {
    const dark = document.documentElement.getAttribute("data-theme") === "dark";
    document.documentElement.setAttribute("data-theme", dark ? "light" : "dark");
    $("themeBtn").textContent = dark ? "🌙" : "☀️";
  };

  // ---- auth tabs ----
  $("tabLogin").onclick = () => {
    $("tabLogin").classList.add("active"); $("tabRegister").classList.remove("active");
    $("loginForm").classList.remove("hidden"); $("registerForm").classList.add("hidden"); clearMsg($("authMsg"));
  };
  $("tabRegister").onclick = () => {
    $("tabRegister").classList.add("active"); $("tabLogin").classList.remove("active");
    $("registerForm").classList.remove("hidden"); $("loginForm").classList.add("hidden"); clearMsg($("authMsg"));
  };

  // ---- register / login ----
  $("registerBtn").onclick = async () => {
    const name = $("regName").value.trim(), email = $("regEmail").value.trim(), password = $("regPass").value;
    if (!name || !email || !password) return showMsg($("authMsg"), "Please fill in name, email and password.", "error");
    try { enterApp(await api("/auth/register", "POST", { name, email, password })); }
    catch (err) { handle(err, $("authMsg")); }
  };
  $("loginBtn").onclick = async () => {
    const email = $("loginEmail").value.trim(), password = $("loginPass").value;
    if (!email || !password) return showMsg($("authMsg"), "Please enter your email and password.", "error");
    try { enterApp(await api("/auth/login", "POST", { email, password })); }
    catch (err) { handle(err, $("authMsg")); }
  };

  function enterApp(data){
    token = data.token;
    $("userName").textContent = (data.user && data.user.name) || "there";
    $("authView").classList.add("hidden");
    $("notesView").classList.remove("hidden");
    loadNotes();
  }

  $("logoutBtn").onclick = () => {
    token = null; allNotes = [];
    $("notesView").classList.add("hidden"); $("authView").classList.remove("hidden");
    $("loginEmail").value = ""; $("loginPass").value = ""; clearMsg($("authMsg"));
  };

  // ---- notes ----
  async function loadNotes(){
    try { allNotes = await api("/notes", "GET"); renderNotes(); }
    catch (err) { handle(err, $("notesMsg")); }
  }

  $("searchBox").oninput = renderNotes;

  function getFiltered(){
    const q = $("searchBox").value.trim().toLowerCase();
    if (!q) return allNotes;
    return allNotes.filter(n =>
      (n.title || "").toLowerCase().includes(q) ||
      (n.content || "").toLowerCase().includes(q) ||
      (n.tags || []).some(t => t.toLowerCase().includes(q))
    );
  }

  function renderNotes(){
    const list = $("notesList");
    list.innerHTML = "";
    const notes = getFiltered();
    if (!notes.length){
      const hasQuery = $("searchBox").value.trim();
      list.innerHTML = '<div class="empty">' + (hasQuery ? "No notes match your search." : "No notes yet. Write your first one above.") + "</div>";
      return;
    }
    notes.forEach(n => list.appendChild(buildCard(n)));
  }

  function buildCard(n){
    const slip = document.createElement("div");
    slip.className = "slip";

    const h = document.createElement("h3"); h.className = "note-title"; h.textContent = n.title || "Untitled";
    const p = document.createElement("p"); p.className = "note-body"; p.textContent = n.content || "";
    slip.append(h, p);

    if (n.tags && n.tags.length){
      const tagWrap = document.createElement("div"); tagWrap.className = "tags";
      n.tags.forEach(t => {
        const chip = document.createElement("button");
        chip.className = "tag"; chip.type = "button"; chip.textContent = "#" + t;
        chip.onclick = () => { $("searchBox").value = t; renderNotes(); };
        tagWrap.appendChild(chip);
      });
      slip.appendChild(tagWrap);
    }

    const foot = document.createElement("div"); foot.className = "note-foot";
    const date = document.createElement("span");
    date.textContent = n.createdAt ? new Date(n.createdAt).toLocaleString() : "";
    const actions = document.createElement("div"); actions.className = "note-actions";
    const editBtn = document.createElement("button"); editBtn.className = "link-btn"; editBtn.type = "button"; editBtn.textContent = "Edit";
    editBtn.onclick = () => slip.replaceWith(buildEditCard(n));
    const delBtn = document.createElement("button"); delBtn.className = "link-btn danger"; delBtn.type = "button"; delBtn.textContent = "Delete";
    delBtn.onclick = () => deleteNote(n._id);
    actions.append(editBtn, delBtn);
    foot.append(date, actions);
    slip.appendChild(foot);

    return slip;
  }

  function buildEditCard(n){
    const slip = document.createElement("div");
    slip.className = "slip";

    const titleIn = document.createElement("input"); titleIn.className = "compose-title"; titleIn.value = n.title || "";
    const bodyIn = document.createElement("textarea"); bodyIn.className = "compose-body"; bodyIn.value = n.content || "";
    const tagsIn = document.createElement("input"); tagsIn.className = "compose-tags"; tagsIn.value = (n.tags || []).join(", "); tagsIn.placeholder = "Tags (comma separated)";

    const actions = document.createElement("div"); actions.className = "compose-actions"; actions.style.gap = "10px";
    const cancelBtn = document.createElement("button"); cancelBtn.className = "link-btn"; cancelBtn.type = "button"; cancelBtn.textContent = "Cancel";
    const saveBtn = document.createElement("button"); saveBtn.className = "btn"; saveBtn.type = "button"; saveBtn.textContent = "Save";

    saveBtn.onclick = async () => {
      try {
        await api("/notes/" + n._id, "PUT", {
          title: titleIn.value.trim(),
          content: bodyIn.value.trim(),
          tags: parseTags(tagsIn.value)
        });
        loadNotes();
      } catch (err) { handle(err, $("notesMsg")); }
    };
    cancelBtn.onclick = () => slip.replaceWith(buildCard(n));

    actions.append(cancelBtn, saveBtn);
    slip.append(titleIn, bodyIn, tagsIn, actions);
    return slip;
  }

  $("addBtn").onclick = async () => {
    const title = $("noteTitle").value.trim();
    const content = $("noteBody").value.trim();
    const tags = parseTags($("noteTags").value);
    if (!title && !content) return showMsg($("notesMsg"), "Write a title or some text first.", "error");
    clearMsg($("notesMsg"));
    try {
      await api("/notes", "POST", { title, content, tags });
      $("noteTitle").value = ""; $("noteBody").value = ""; $("noteTags").value = "";
      loadNotes();
    } catch (err) { handle(err, $("notesMsg")); }
  };

  async function deleteNote(id){
    try { await api("/notes/" + id, "DELETE"); loadNotes(); }
    catch (err) { handle(err, $("notesMsg")); }
  }
</script>
</body>
</html>
